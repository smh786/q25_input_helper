name: Release signing

on:
  pull_request_target:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signing-secrets:
    name: Release signing secrets configured
    runs-on: ubuntu-latest

    steps:
      - name: Check release signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          [ -n "$KEYSTORE_BASE64" ] || missing+=("KEYSTORE_BASE64")
          [ -n "$KEYSTORE_PASSWORD" ] || missing+=("KEYSTORE_PASSWORD")
          [ -n "$KEY_ALIAS" ] || missing+=("KEY_ALIAS")
          [ -n "$KEY_PASSWORD" ] || missing+=("KEY_PASSWORD")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing release signing secrets: %s\n' "${missing[*]}"
            exit 1
          fi
